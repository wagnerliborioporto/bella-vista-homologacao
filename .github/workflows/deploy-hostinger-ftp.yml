name: Publicar homologação no GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Gerar site estático
        env:
          GITHUB_PAGES: 'true'
          NEXT_PUBLIC_BASE_PATH: /bella-vista-homologacao
          NEXT_PUBLIC_SITE_URL: https://wagnerliborioporto.github.io/bella-vista-homologacao
          NEXT_PUBLIC_ENABLE_FORMS: 'false'
        run: npx next build --webpack

      - name: Enviar arquivos para publicação
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
