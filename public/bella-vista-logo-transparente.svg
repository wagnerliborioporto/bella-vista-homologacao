<svg xmlns="http://www.w3.org/2000/svg" width="393" height="103" viewBox="0 0 393 103" role="img" aria-labelledby="title desc">
  <title id="title">Bella Vista Beach Residence</title>
  <desc id="desc">Logotipo oficial dourado com fundo transparente</desc>
  <defs>
    <filter id="remove-navy-background" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <!--
        O arquivo oficial possui fundo azul-marinho RGB 7,25,36 e a marca
        dourada RGB 191,153,48. A matriz transforma todo pixel visível no
        dourado oficial e calcula a transparência pela diferença cromática,
        preservando inclusive o antialiasing das bordas.
      -->
      <feColorMatrix
        type="matrix"
        values="
          0 0 0 0 0.749
          0 0 0 0 0.600
          0 0 0 0 0.188
          0.9 0.9 -0.8 0 -0.02"
      />
    </filter>
  </defs>
  <image
    href="https://wagnerliborioporto.github.io/bella-vista-homologacao/bella-vista-logo-oficial.svg"
    x="0"
    y="0"
    width="393"
    height="103"
    preserveAspectRatio="xMidYMid meet"
    filter="url(#remove-navy-background)"
  />
</svg>
